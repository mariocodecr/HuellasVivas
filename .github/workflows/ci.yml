name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. SECRET SCANNING
  # Scans every commit in the PR for leaked credentials, API keys, tokens, etc.
  # Fails immediately if any secret is detected — no merge allowed.
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits in the PR

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. LINT & TYPECHECK — FRONTEND
  # ─────────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: 🎨 Lint & Typecheck — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. LINT & TYPECHECK — BACKEND
  # ─────────────────────────────────────────────────────────────────────────────
  lint-backend:
    name: 🎨 Lint & Typecheck — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. UNIT TESTS — BACKEND
  # Runs all unit tests and enforces minimum coverage thresholds.
  # Coverage report is uploaded as an artifact for review.
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Tests — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()  # upload even if tests fail so we can inspect
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. BUILD — FRONTEND
  # Ensures the Next.js app compiles without errors.
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build — Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]  # only build if lint passes
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Disable telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. BUILD — BACKEND
  # Ensures the NestJS app compiles without errors.
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: 🏗️ Build — Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]  # only build if lint passes
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. COMMIT MESSAGE FORMAT
  # Enforces Conventional Commits format on every commit in the PR.
  # See CONTRIBUTING.md — "Commit Messages" section.
  # ─────────────────────────────────────────────────────────────────────────────
  commitlint:
    name: 📝 Commit Message Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint commit messages
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
        env:
          # Inline config — no commitlint.config file needed in the repo
          COMMITLINT_CONFIG: |
            module.exports = {
              extends: ['@commitlint/config-conventional'],
              rules: {
                'scope-enum': [2, 'always', [
                  'setup','auth','users','wallets','publications',
                  'donations','escrow','comments','notifications',
                  'media','blockchain','stellar','db','config','frontend','nonces'
                ]],
                'subject-max-length': [2, 'always', 72],
              },
            };
